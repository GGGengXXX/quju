name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${DEPLOY_HOST}" ]; then
            echo "::error::DEPLOY_HOST is empty or not configured"
            missing=1
          fi
          if [ -z "${DEPLOY_USER}" ]; then
            echo "::error::DEPLOY_USER is empty or not configured"
            missing=1
          fi
          if [ -z "${DEPLOY_SSH_KEY}" ]; then
            echo "::error::DEPLOY_SSH_KEY is empty or not configured"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
      - name: Add server host key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -T 10 -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
      - name: Run remote deploy
        run: |
          set -euo pipefail
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd /srv/quju/main && bash deploy/deploy.sh"
