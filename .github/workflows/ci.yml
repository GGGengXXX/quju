name: CI

on:
  push:
    branches:
      - master
      - dev
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - master
      - dev

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Lint OpenAPI contract
        run: make lint-contract

  backend:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: quju_ci
          MYSQL_USER: quju
          MYSQL_PASSWORD: quju_ci_password
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 13306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 13306 -uquju -pquju_ci_password --silent; then
              exit 0
            fi
            sleep 2
          done
          exit 1
      - name: Load schema
        run: |
          mysql -h 127.0.0.1 -P 13306 -uquju -pquju_ci_password quju_ci < contracts/schema.sql
      - name: Run backend tests
        working-directory: backend
        env:
          DB_URL: jdbc:mysql://127.0.0.1:13306/quju_ci?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
          DB_USERNAME: quju
          DB_PASSWORD: quju_ci_password
          JWT_SECRET: ci-secret
        run: mvn test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Type check frontend
        working-directory: frontend
        run: npm run type-check
      - name: Build frontend
        working-directory: frontend
        run: npm run build
